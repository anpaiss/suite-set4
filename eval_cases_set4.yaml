- id: S4-SEQ1
  famiglia: sequenziamento
  system_prompt: sequenziamento
  input: 'SITO: cliente-manutenzione.it (e-commerce in produzione)

    Stato attuale e interventi da svolgere:

    - PHP attualmente 7.4; va portato a 8.2

    - WooCommerce 7.8 -> da aggiornare a 9.0 (la 9.0 richiede PHP 8.0+)

    - Tema Flatsome 3.16 -> da aggiornare a 3.18 (la 3.18 richiede WooCommerce 8.0+)

    - L''ultimo backup automatico risale a 20 giorni fa

    - Va installato un certificato SSL wildcard nuovo (l''attuale scade tra 5 giorni)

    - 4 plugin minori con aggiornamenti di sola sicurezza disponibili

    '
  verdetto_atteso: 'ordine con dipendenze: backup -> (SSL) -> PHP -> WooCommerce -> tema -> plugin
    minori'
  criteri_contenuto:
  - mette il BACKUP come primo passo assoluto (rete di sicurezza prima di toccare qualsiasi cosa)
  - mette PHP 8.2 prima di WooCommerce 9.0 (che richiede PHP 8.0+)
  - mette WooCommerce 9.0 prima del tema Flatsome 3.18 (che richiede WooCommerce 8.0+)
  - tratta l'SSL come urgenza indipendente da fare presto (scade tra 5 giorni), inseribile in
    parallelo/subito
  - mette i plugin minori di sicurezza come passo finale o parallelo
  criteri_negativi:
  - 'non aggiorna WooCommerce prima di PHP (romperebbe: richiede PHP 8.0+)'
  - non aggiorna il tema prima di WooCommerce (catena di dipendenza violata)
  - non inizia gli aggiornamenti senza prima fare il backup
  note: 'Famiglia nuova: non basta identificare i problemi, vanno ORDINATI rispettando una catena
    di dipendenze a tre livelli (PHP -> WooCommerce -> tema) piu un backup propedeutico e un SSL
    urgente indipendente. Misura il ragionamento di pianificazione, cruciale per un agente che
    AGISCE. Il modello debole elenca gli interventi senza ordine o sbaglia la catena di dipendenze
    (es. tema prima di WooCommerce).

    '
- id: S4-SEQ2
  famiglia: sequenziamento
  system_prompt: sequenziamento
  input: "SITO: sito-compromesso.it\nSituazione: Wordfence ha rilevato una backdoor attiva (web\
    \ shell in un file\ndel tema) su un sito in produzione. Stato e cose da fare:\n- La web shell\
    \ e tuttora presente e potenzialmente in uso\n- Le credenziali admin potrebbero essere compromesse\n\
    - Esiste un backup pulito di 10 giorni fa (prima dell'infezione)\n- Il sito ha ricevuto 8\
    \ ordini cliente negli ultimi 10 giorni (dopo il backup)\n- Va aggiornato il core WordPress\
    \ (era fermo a una versione con CVE nota,\n  probabile vettore d'ingresso)\n"
  verdetto_atteso: isolare/mettere offline -> preservare dati ordini -> bonifica -> cambio credenziali
    -> ripristino/patch -> core update
  criteri_contenuto:
  - 'primo: contenere - isolare il sito o metterlo in manutenzione per fermare l''uso della shell'
  - 'riconosce il conflitto: il backup pulito perderebbe gli 8 ordini -> vanno esportati/preservati
    prima di ripristinare'
  - cambio di tutte le credenziali (admin compromesse) come passo necessario
  - aggiornare il core (chiude il CVE, probabile vettore) per non essere reinfettati
  - 'ordine logico: contieni, preserva dati, bonifica, cambia credenziali, patcha il vettore'
  criteri_negativi:
  - non ripristina il backup pulito SENZA prima preservare gli 8 ordini (perdita dati cliente)
  - non aggiorna il core lasciando la shell attiva (non risolve la compromissione in corso)
  - non ignora il cambio credenziali
  note: 'Sequenziamento sotto vincolo critico: c''e un conflitto reale (il backup pulito risolve
    l''infezione ma cancella 8 ordini cliente). Il modello deve riconoscere il conflitto e ordinare
    gli interventi preservando i dati E bonificando. Misura pianificazione + gestione di un trade-off,
    il livello piu alto di ragionamento operativo della suite.

    '
